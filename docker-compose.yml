/**
 * PHOTOMEMORY PRO - DOCKER ORCHESTRATION (FINAL REVISION)
 * ---------------------------------------------------------
 * This file links the Database, Backend, and Frontend.
 * Updated to support Build Arguments for the Vite/Nginx frontend.
 */

version: '3.8'

services:
  # 1. DATABASE SERVICE (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: photomemory_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: photomemory
    volumes:
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # 2. BACKEND API SERVICE (Node.js)
  backend:
    build: ./backend
    container_name: photomemory_api
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    depends_on:
      - db

  # 3. FRONTEND SERVICE (Nginx + React)
  frontend:
    build:
      context: ./frontend
      # DEVOPS CRITICAL: Using 'args' to pass the API URL during the build phase.
      # This ensures the Vite 'dist' folder contains the correct backend URL.
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: photomemory_ui
    ports:
      # We mapped Nginx to 80 in the Dockerfile, but we'll expose it on 3000
      # so your local workflow remains unchanged.
      - "3000:80" 
    depends_on:
      - backend

# GLOBAL VOLUMES
volumes:
  postgres_data:
